version: 2

models:
  - name: stg_customers
    description: "Staged customers with basic type casting"
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Staged orders with date casting"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['completed', 'shipped', 'pending', 'returned']

  - name: stg_products
    description: "Staged product catalog"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null
